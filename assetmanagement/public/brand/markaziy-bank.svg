<svg xmlns="http://www.w3.org/2000/svg" width="920" height="220" viewBox="0 0 920 220" role="img" aria-label="O'zbekiston Respublikasi Markaziy banki">
  <defs>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#e7c56a"/>
      <stop offset="0.5" stop-color="#d7b04b"/>
      <stop offset="1" stop-color="#b88a2e"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.14"/>
    </filter>
  </defs>

  <!-- Mark (simple brand placeholder) -->
  <g transform="translate(40,30)" filter="url(#softShadow)">
    <circle cx="80" cy="80" r="78" fill="white" stroke="url(#gold)" stroke-width="8"/>
    <circle cx="80" cy="80" r="58" fill="white" stroke="#f3e3b7" stroke-width="2"/>
    <text x="80" y="92" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="54" font-weight="800" fill="url(#gold)">MB</text>
  </g>

  <!-- Text -->
  <g transform="translate(210,58)">
    <text x="0" y="0" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="700" fill="#111827">O'zbekiston Respublikasi</text>
    <text x="0" y="70" font-family="Georgia, 'Times New Roman', serif" font-size="62" font-weight="800" fill="#111827">Markaziy banki</text>
    <rect x="0" y="102" width="540" height="2" fill="#e5e7eb"/>
    <text x="0" y="146" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" fill="#6b7280">
      SmartBanking / Smart Office
    </text>
  </g>
</svg>
