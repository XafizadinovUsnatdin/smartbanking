server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    add_header Cache-Control "public, max-age=0, must-revalidate" always;
    try_files $uri $uri/ /index.html;
  }

  location /assets/ {
    expires 365d;
    add_header Cache-Control "public, immutable";
  }
}
