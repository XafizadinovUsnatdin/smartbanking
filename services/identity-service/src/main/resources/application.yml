server:
  port: 8081

spring:
  application:
    name: identity-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/identity_db}
    username: ${DB_USER:smartbanking}
    password: ${DB_PASS:smartbanking}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

security:
  jwt:
    # Dev default only; override in prod.
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-32b}
    access-ttl: ${JWT_ACCESS_TTL:PT15M}
    refresh-ttl: ${JWT_REFRESH_TTL:P7D}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

bootstrap:
  admin:
    # Optional. If set and users table is empty, the first ADMIN user is created automatically.
    username: ${BOOTSTRAP_ADMIN_USERNAME:}
    password: ${BOOTSTRAP_ADMIN_PASSWORD:}
    full-name: ${BOOTSTRAP_ADMIN_FULL_NAME:Admin}
    # Set true ONLY to recover access when you forgot the bootstrap admin password.
    # When enabled and the user already exists, password will be reset to BOOTSTRAP_ADMIN_PASSWORD.
    reset: ${BOOTSTRAP_ADMIN_RESET:false}
