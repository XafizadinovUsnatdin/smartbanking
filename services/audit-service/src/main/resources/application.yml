server:
  port: 8083

spring:
  application:
    name: audit-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/audit_db}
    username: ${DB_USER:smartbanking}
    password: ${DB_PASS:smartbanking}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: audit-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

kafka:
  topics:
    asset-events: ${KAFKA_TOPIC_ASSET_EVENTS:asset.events}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
