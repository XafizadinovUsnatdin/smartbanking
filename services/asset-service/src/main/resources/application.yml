server:
  port: 8082

spring:
  application:
    name: asset-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/asset_db}
    username: ${DB_USER:smartbanking}
    password: ${DB_PASS:smartbanking}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      repositories:
        enabled: false

security:
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-32b}

kafka:
  topics:
    asset-events: ${KAFKA_TOPIC_ASSET_EVENTS:asset.events}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
